<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Grupo - GruposWhats.app</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container-fluid">
            <div class="header-top">
                <div class="logo" data-testid="logo" onclick="window.location.href='/'">
                    <div class="logo-icon">
                        <i class="fab fa-whatsapp"></i>
                    </div>
                    <div class="logo-text">
                        <span>GRUPOS<strong>WHATS</strong></span>
                        <small>.app</small>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn-theme-toggle" onclick="toggleTheme()" data-testid="theme-toggle" title="Alternar modo escuro">
                        <i class="fas fa-moon" id="themeIcon"></i>
                    </button>
                    <button class="btn-header btn-enviar active" onclick="window.location.href='/enviar-grupo.html'" data-testid="enviar-grupo-btn">
                        <i class="fas fa-paper-plane"></i>
                        <span>ENVIAR GRUPO</span>
                    </button>
                    <button class="btn-header btn-meus" onclick="window.location.href='/meus-grupos.html'" data-testid="meus-grupos-btn">
                        <i class="fas fa-users"></i>
                        <span>MEUS GRUPOS</span>
                    </button>
                    <button class="menu-toggle" onclick="toggleMenu()" data-testid="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
            <div class="header-bottom">
                <div class="search-container-full">
                    <input type="text" class="search-input-full" placeholder="Buscar um grupo..." id="searchInput" data-testid="search-input">
                    <button class="btn-search">Buscar</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Página Enviar Grupo -->
    <main class="container" style="margin-top: 30px; min-height: calc(100vh - 300px);">
        <div class="page-header">
            <h1><i class="fas fa-paper-plane"></i> Enviar Grupo</h1>
            <p>Compartilhe seu grupo de WhatsApp com milhares de pessoas</p>
        </div>

        <div class="form-container" style="max-width: 700px; margin: 0 auto;">
            <form id="addGroupForm" onsubmit="submitGroup(event)">
                <!-- Upload de Foto - PRIMEIRO -->
                <div class="form-group">
                    <label for="groupImage"><i class="fas fa-image"></i> Foto do Grupo *</label>
                    <div class="image-upload-container">
                        <input type="file" id="groupImageFile" accept="image/*" onchange="previewImage(event)" style="display: none;">
                        <div id="imagePreviewContainer" class="image-preview-container" onclick="document.getElementById('groupImageFile').click()">
                            <div class="upload-placeholder">
                                <i class="fas fa-camera"></i>
                                <p>Clique para adicionar uma foto</p>
                                <small>JPG, PNG ou WebP</small>
                            </div>
                            <img id="imagePreview" class="image-preview-chat" style="display: none;">
                            <div class="image-change-overlay" style="display: none;">
                                <i class="fas fa-edit"></i>
                                <span>Alterar foto</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="groupName"><i class="fas fa-tag"></i> Nome do Grupo *</label>
                    <input type="text" id="groupName" required placeholder="Ex: Amigos da Escola" data-testid="group-name">
                </div>

                <div class="form-group">
                    <label for="groupCategory"><i class="fas fa-folder"></i> Categoria *</label>
                    <select id="groupCategory" required data-testid="group-category">
                        <option value="">Selecione uma categoria</option>
                        <option value="amizade">👥 Amizade</option>
                        <option value="namoro">💑 Namoro</option>
                        <option value="zoeira">😂 Zoeira</option>
                        <option value="vendas">💰 Vendas</option>
                        <option value="estudos">📚 Estudos</option>
                        <option value="18mais">🔞 +18</option>
                        <option value="outros">📌 Outros</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="groupDescription"><i class="fas fa-align-left"></i> Descrição *</label>
                    <textarea id="groupDescription" required rows="4" placeholder="Descreva seu grupo..." data-testid="group-description"></textarea>
                </div>

                <div class="form-group">
                    <label for="groupLink"><i class="fab fa-whatsapp"></i> Link do Grupo *</label>
                    <input type="url" id="groupLink" required placeholder="https://chat.whatsapp.com/..." data-testid="group-link">
                    <small>Cole o link de convite do seu grupo do WhatsApp</small>
                </div>

                <div class="form-actions" style="display: flex; gap: 12px; margin-top: 30px;">
                    <button type="button" class="btn-secondary" onclick="window.location.href='/'" style="flex: 1;">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn-submit-modern" data-testid="submit-group-btn" style="flex: 2;">
                        <i class="fas fa-paper-plane"></i> Enviar Grupo
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 GruposWhats.app - Todos os direitos reservados</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        let uploadedImageBase64 = '';

        // Preview da imagem
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImageBase64 = e.target.result;
                    
                    const preview = document.getElementById('imagePreview');
                    const placeholder = document.querySelector('.upload-placeholder');
                    const overlay = document.querySelector('.image-change-overlay');
                    
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                    overlay.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        async function submitGroup(event) {
            event.preventDefault();

            if (!uploadedImageBase64) {
                showAlert('Por favor, adicione uma foto do grupo', 'error');
                return;
            }

            const groupData = {
                nome: document.getElementById('groupName').value,
                categoria: document.getElementById('groupCategory').value,
                descricao: document.getElementById('groupDescription').value,
                link: document.getElementById('groupLink').value,
                imagem: uploadedImageBase64
            };

            try {
                const response = await apiCall('/api/groups/add', {
                    method: 'POST',
                    body: JSON.stringify(groupData)
                });

                if (response.success) {
                    // Adicionar aos meus grupos
                    const meusGrupos = JSON.parse(localStorage.getItem('meusGrupos') || '[]');
                    meusGrupos.push(response.groupId);
                    localStorage.setItem('meusGrupos', JSON.stringify(meusGrupos));

                    showAlert('✅ Grupo enviado com sucesso!', 'success');
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showAlert(response.error || 'Erro ao enviar grupo', 'error');
                }
            } catch (error) {
                showAlert('Erro ao enviar grupo', 'error');
            }
        }
    </script>
</body>
</html>
